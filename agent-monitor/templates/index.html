<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agent Monitor</title>
  <style>
    :root {
      --bg: #0d0f14;
      --panel: #13161e;
      --border: #1e2330;
      --accent: #3b82f6;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --muted: #4b5563;
      --text: #e2e8f0;
      --subtext: #94a3b8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      min-height: 100vh;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--text);
    }
    header h1 span { color: var(--accent); }
    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
      color: var(--subtext);
      font-size: 11px;
    }
    .pulse {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 1.5s infinite;
      display: inline-block;
      margin-right: 6px;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--subtext);
    }
    .toolbar button {
      background: var(--border);
      border: 1px solid var(--muted);
      color: var(--subtext);
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      transition: all 0.15s;
    }
    .toolbar button:hover { background: var(--muted); color: var(--text); }
    #stats { display: flex; gap: 24px; }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-val { font-size: 20px; font-weight: 700; color: var(--text); }
    .stat-val.green { color: var(--green); }
    .stat-val.yellow { color: var(--yellow); }
    .stat-val.muted { color: var(--muted); }
    .stat-label { font-size: 10px; color: var(--subtext); text-transform: uppercase; letter-spacing: 0.08em; }
    .container { padding: 20px 24px; }
    .empty {
      text-align: center;
      padding: 60px 0;
      color: var(--muted);
    }
    .empty-icon { font-size: 36px; margin-bottom: 12px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .card.running { border-color: rgba(59,130,246,0.4); }
    .card.done { border-color: rgba(34,197,94,0.3); opacity: 0.75; }
    .card.error { border-color: rgba(239,68,68,0.4); }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .card-project {
      font-size: 10px;
      color: var(--subtext);
      margin-top: 2px;
    }
    .badge {
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .badge.running {
      background: rgba(59,130,246,0.15);
      color: #60a5fa;
      border: 1px solid rgba(59,130,246,0.3);
    }
    .badge.done {
      background: rgba(34,197,94,0.1);
      color: #4ade80;
      border: 1px solid rgba(34,197,94,0.2);
    }
    .badge.error {
      background: rgba(239,68,68,0.1);
      color: #f87171;
      border: 1px solid rgba(239,68,68,0.2);
    }
    .card-body { padding: 14px 16px; }
    .meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 11px;
      color: var(--subtext);
    }
    .meta-key { color: var(--muted); min-width: 56px; }
    .meta-val { color: var(--subtext); }
    .meta-val.highlight { color: var(--text); }
    .sections-pill {
      display: inline-block;
      background: rgba(59,130,246,0.1);
      color: #93c5fd;
      border: 1px solid rgba(59,130,246,0.2);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 11px;
      margin-top: 4px;
      margin-bottom: 10px;
    }
    .files-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .file-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
    }
    .file-row:last-child { border-bottom: none; }
    .file-icon { font-size: 12px; }
    .file-name { flex: 1; color: var(--text); }
    .file-size { color: var(--subtext); min-width: 48px; text-align: right; }
    .file-time { color: var(--muted); min-width: 56px; text-align: right; }
    .progress-bar-wrap {
      margin-top: 12px;
      background: var(--border);
      border-radius: 4px;
      height: 4px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      border-radius: 4px;
      background: var(--accent);
      transition: width 0.5s ease;
    }
    .progress-bar.done { background: var(--green); }
    .timer {
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
      text-align: right;
    }
    .last-update {
      font-size: 10px;
      color: var(--muted);
      padding: 8px 24px 16px;
    }
    .spinner {
      display: inline-block;
      width: 10px; height: 10px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .section-tag {
      font-size: 10px;
      background: rgba(234,179,8,0.1);
      color: #fde68a;
      border: 1px solid rgba(234,179,8,0.2);
      border-radius: 3px;
      padding: 1px 6px;
      margin-right: 4px;
    }
  </style>
</head>
<body>

<header>
  <h1>⚙️ <span>Claw</span> Agent Monitor</h1>
  <div class="header-right">
    <span><span class="pulse"></span>Live · refreshes every 3s</span>
    <span id="last-tick">–</span>
  </div>
</header>

<div class="toolbar">
  <div id="stats">
    <div class="stat">
      <div class="stat-val yellow" id="s-running">–</div>
      <div class="stat-label">Running</div>
    </div>
    <div class="stat">
      <div class="stat-val green" id="s-done">–</div>
      <div class="stat-label">Done</div>
    </div>
    <div class="stat">
      <div class="stat-val muted" id="s-total">–</div>
      <div class="stat-label">Total</div>
    </div>
  </div>
  <div style="flex:1"></div>
  <button onclick="clearDone()">Clear Finished</button>
  <button onclick="fetchAgents()">↺ Refresh</button>
</div>

<div class="container">
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">
    <div class="empty-icon">🤖</div>
    <div>No agents registered yet.</div>
    <div style="margin-top:6px;font-size:11px;color:var(--muted)">Agents will appear here automatically when spawned.</div>
  </div>
</div>

<div class="last-update" id="last-update"></div>

<script>
function fmtBytes(b) {
  if (!b) return '–';
  if (b < 1024) return b + ' B';
  return (b / 1024).toFixed(1) + ' KB';
}

function fmtElapsed(s) {
  if (s === null || s === undefined) return '';
  if (s < 60) return s + 's';
  return Math.floor(s / 60) + 'm ' + (s % 60) + 's';
}

function renderCard(agent) {
  const status = agent.status || 'running';
  const files = agent.file_progress || [];
  const doneFiles = files.filter(f => f.done).length;
  const totalFiles = files.length || 1;
  // If running with no files done yet, show 5% so bar isn't empty
  const pct = files.length === 0
    ? (status === 'running' ? 5 : 0)
    : Math.round((doneFiles / totalFiles) * 100);

  const filesHtml = files.length ? `
    <div class="files-label">Output Files</div>
    ${files.map(f => `
      <div class="file-row">
        <span class="file-icon">${f.done ? '✅' : '⏳'}</span>
        <span class="file-name">${f.file}</span>
        <span class="file-size">${f.done ? fmtBytes(f.size) : '–'}</span>
        <span class="file-time">${f.mtime || '–'}</span>
      </div>
    `).join('')}
    <div class="progress-bar-wrap">
      <div class="progress-bar ${status === 'done' ? 'done' : ''}" style="width:${status === 'done' ? 100 : pct}%"></div>
    </div>
  ` : '';

  const spinnerHtml = status === 'running' ? '<span class="spinner"></span>' : '';
  const sections = (agent.sections || '').split(',').map(s => s.trim()).filter(Boolean);
  const sectionTags = sections.map(s => `<span class="section-tag">${s}</span>`).join('');

  return `
    <div class="card ${status}" id="card-${agent.id}">
      <div class="card-header">
        <div>
          <div class="card-title">${spinnerHtml}${agent.label}</div>
          <div class="card-project">${agent.project || ''} ${agent.phase ? '· ' + agent.phase : ''}</div>
        </div>
        <span class="badge ${status}">${status}</span>
      </div>
      <div class="card-body">
        ${sectionTags ? `<div style="margin-bottom:10px">${sectionTags}</div>` : ''}
        <div class="meta-row">
          <span class="meta-key">PID</span>
          <span class="meta-val highlight">${agent.pid || '–'}</span>
        </div>
        <div class="meta-row">
          <span class="meta-key">Started</span>
          <span class="meta-val">${agent.started_at || '–'}</span>
        </div>
        ${agent.ended_at ? `
        <div class="meta-row">
          <span class="meta-key">Ended</span>
          <span class="meta-val">${agent.ended_at}</span>
        </div>` : ''}
        ${agent.notes ? `
        <div class="meta-row">
          <span class="meta-key">Notes</span>
          <span class="meta-val">${agent.notes}</span>
        </div>` : ''}
        <div style="margin-top:10px">${filesHtml}</div>
        ${agent.elapsed !== null ? `<div class="timer">⏱ ${fmtElapsed(agent.elapsed)}</div>` : ''}
        ${agent.summary ? `<div style="margin-top:8px;font-size:11px;color:var(--green)">✓ ${agent.summary}</div>` : ''}
      </div>
    </div>
  `;
}

async function fetchAgents() {
  try {
    const res = await fetch('/api/agents');
    const agents = await res.json();

    const running = agents.filter(a => a.status === 'running').length;
    const done = agents.filter(a => a.status === 'done').length;
    document.getElementById('s-running').textContent = running;
    document.getElementById('s-done').textContent = done;
    document.getElementById('s-total').textContent = agents.length;

    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');

    if (agents.length === 0) {
      grid.innerHTML = '';
      empty.style.display = 'block';
    } else {
      empty.style.display = 'none';
      // Sort: running first, then by started_ts desc
      agents.sort((a, b) => {
        if (a.status === b.status) return (b.started_ts || 0) - (a.started_ts || 0);
        return a.status === 'running' ? -1 : 1;
      });
      grid.innerHTML = agents.map(renderCard).join('');
    }

    const now = new Date();
    document.getElementById('last-tick').textContent = now.toLocaleTimeString();
    document.getElementById('last-update').textContent = `Last updated: ${now.toLocaleTimeString()}`;
  } catch (e) {
    document.getElementById('last-update').textContent = `Error: ${e.message}`;
  }
}

async function clearDone() {
  await fetch('/api/clear', { method: 'POST' });
  fetchAgents();
}

fetchAgents();
setInterval(fetchAgents, 3000);
</script>
</body>
</html>
