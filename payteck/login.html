<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Payteck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #05080f; --bg2: #0b1120; --bg3: #111d35;
      --blue: #1a6fff; --purple: #7b3fff; --cyan: #00d4ff;
      --text: #e2e8f0; --muted: #8899bb; --border: rgba(100,150,255,0.15);
    }
    body {
      font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 2rem;
    }
    .grid-bg {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(26,111,255,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26,111,255,0.06) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 30%, transparent 100%);
      pointer-events: none;
    }
    .login-card {
      width: 100%; max-width: 420px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 20px; padding: 3rem 2.5rem;
      position: relative; z-index: 1;
      box-shadow: 0 0 60px rgba(26,111,255,0.1);
    }
    .logo-wrap { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 2rem; justify-content: center; }
    .logo-wrap img { height: 44px; width: 44px; object-fit: contain; border-radius: 8px; }
    .logo-wrap span {
      font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: 700;
      background: linear-gradient(90deg, var(--blue), var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    h1 {
      font-family: 'Orbitron', sans-serif; font-size: 1.4rem; font-weight: 700;
      text-align: center; margin-bottom: 0.5rem;
    }
    .sub { color: var(--muted); font-size: 0.88rem; text-align: center; margin-bottom: 2rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.25rem; }
    .form-group label { font-size: 0.8rem; font-weight: 500; color: var(--muted); }
    .form-group input {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.75rem 1rem;
      color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.9rem;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus {
      border-color: rgba(26,111,255,0.5); box-shadow: 0 0 0 3px rgba(26,111,255,0.1);
    }
    .forgot { text-align: right; margin-top: -0.75rem; margin-bottom: 1.5rem; }
    .forgot a { font-size: 0.8rem; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .forgot a:hover { color: var(--cyan); }
    .btn-login {
      width: 100%; padding: 0.9rem;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      color: #fff; font-weight: 600; font-size: 0.95rem;
      border: none; border-radius: 8px; cursor: pointer;
      font-family: 'Inter', sans-serif; transition: box-shadow 0.2s, transform 0.2s;
      margin-bottom: 1.25rem;
    }
    .btn-login:hover { box-shadow: 0 0 28px rgba(26,111,255,0.45); transform: translateY(-1px); }
    .back { text-align: center; font-size: 0.85rem; color: var(--muted); }
    .back a { color: var(--cyan); text-decoration: none; }
    .back a:hover { text-decoration: underline; }
    .divider-line {
      display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0;
      color: var(--muted); font-size: 0.8rem;
    }
    .divider-line::before, .divider-line::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="login-card">
    <div class="logo-wrap">
      <img src="logo.webp" alt="Payteck" />
      <span>PAYTECK</span>
    </div>
    <h1>Welcome Back</h1>
    <p class="sub">Sign in to manage your orders and appointments</p>
    <form>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="••••••••" required />
      </div>
      <div class="forgot"><a href="#">Forgot password?</a></div>
      <button type="submit" class="btn-login">Sign In</button>
    </form>
    <p class="back">Don't have an account? <a href="#">Create one</a></p>
    <div class="divider-line">or</div>
    <p class="back"><a href="index.html">← Back to Home</a></p>
  </div>
</body>
</html>
