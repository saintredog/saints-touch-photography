<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Now — Payteck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #05080f; --bg2: #0b1120; --bg3: #111d35;
      --blue: #1a6fff; --purple: #7b3fff; --cyan: #00d4ff; --red: #ff3a3a;
      --text: #e2e8f0; --muted: #8899bb; --border: rgba(100,150,255,0.15);
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 68px;
      background: rgba(5,8,15,0.95); border-bottom: 1px solid var(--border);
    }
    .nav-logo { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; }
    .nav-logo img { height: 44px; width: 44px; object-fit: contain; border-radius: 8px; }
    .nav-logo span {
      font-family: 'Orbitron', sans-serif; font-size: 1.1rem; font-weight: 700;
      background: linear-gradient(90deg, var(--blue), var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .back-link { color: var(--muted); text-decoration: none; font-size: 0.875rem; transition: color 0.2s; }
    .back-link:hover { color: var(--cyan); }
    .page-wrap {
      max-width: 680px; margin: 0 auto; padding: 4rem 2rem;
      display: flex; flex-direction: column; align-items: center; text-align: center;
    }
    .tag {
      display: inline-block; padding: 0.35rem 1rem;
      border: 1px solid rgba(0,212,255,0.3); border-radius: 999px;
      font-size: 0.78rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--cyan); background: rgba(0,212,255,0.06); margin-bottom: 1.5rem;
    }
    h1 {
      font-family: 'Orbitron', sans-serif; font-size: 2.2rem; font-weight: 700;
      margin-bottom: 1rem; line-height: 1.2;
    }
    h1 span {
      background: linear-gradient(90deg, var(--blue), var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    p { color: var(--muted); font-size: 0.95rem; line-height: 1.75; margin-bottom: 2rem; }
    .form-card {
      width: 100%; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 16px; padding: 2.5rem; text-align: left;
    }
    .form-group { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.25rem; }
    .form-group label { font-size: 0.8rem; font-weight: 500; color: var(--muted); letter-spacing: 0.04em; }
    .form-group input, .form-group select, .form-group textarea {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.75rem 1rem;
      color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.9rem;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group select { cursor: pointer; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: rgba(26,111,255,0.5); box-shadow: 0 0 0 3px rgba(26,111,255,0.1);
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group textarea { resize: vertical; min-height: 100px; }
    .btn-submit {
      width: 100%; padding: 0.9rem;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      color: #fff; font-weight: 600; font-size: 0.95rem;
      border: none; border-radius: 8px; cursor: pointer;
      font-family: 'Inter', sans-serif; transition: box-shadow 0.2s, transform 0.2s;
    }
    .btn-submit:hover { box-shadow: 0 0 28px rgba(26,111,255,0.45); transform: translateY(-1px); }
    @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">
    <img src="logo.webp" alt="Payteck" />
    <span>PAYTECK</span>
  </a>
  <a class="back-link" href="index.html">← Back to Home</a>
</nav>

<div class="page-wrap">
  <div class="tag">Appointment Booking</div>
  <h1>Book <span>Your Visit</span></h1>
  <p>Schedule a repair, upgrade evaluation, or drop-off at Payteck. We'll reach out to confirm your appointment.</p>

  <div class="form-card">
    <form>
      <div class="form-row">
        <div class="form-group">
          <label>First Name *</label>
          <input type="text" placeholder="John" required />
        </div>
        <div class="form-group">
          <label>Last Name *</label>
          <input type="text" placeholder="Doe" required />
        </div>
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input type="email" placeholder="john@example.com" required />
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="tel" placeholder="(980) 000-0000" />
      </div>
      <div class="form-group">
        <label>Service Needed *</label>
        <select required>
          <option value="" disabled selected>Select a service</option>
          <option>Computer Repair</option>
          <option>Computer Upgrade</option>
          <option>Computer Sales / Purchase</option>
          <option>Data Wiping</option>
          <option>Computer Recycling / Donation</option>
          <option>Education / Course Interest</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Preferred Date</label>
        <input type="date" />
      </div>
      <div class="form-group">
        <label>Additional Notes</label>
        <textarea placeholder="Describe the issue or what you need..."></textarea>
      </div>
      <button type="submit" class="btn-submit">Request Appointment</button>
    </form>
  </div>
</div>
</body>
</html>
